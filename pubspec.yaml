name: arabic_programming_app
description: "تطبيق تعلم البرمجة بالعربية - تركيز على Python"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI & Navigation
  cupertino_icons: ^1.0.6
  go_router: ^14.8.1
  google_fonts: ^6.1.0
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Storage & Preferences
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/images/avatars/
    - assets/images/backgrounds/
    - assets/images/tracks/
    - assets/images/lessons/
  
  fonts:
    - family: Cairo
      fonts:
        - asset: fonts/Cairo-Regular.ttf
        - asset: fonts/Cairo-Bold.ttf
          weight: 700
