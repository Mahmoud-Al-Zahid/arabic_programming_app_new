name: arabic_programming_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/images/avatars/
    - assets/images/backgrounds/
    - assets/images/tracks/
    - assets/images/lessons/
    - assets/images/languages/
    - assets/images/slides/
    - assets/languages/
    - assets/courses/
    - assets/lessons/
    - assets/quizzes/
