name: arabic_programming_app
description: "A comprehensive Arabic programming learning app with modern UI and JSON-based content management"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Navigation
  go_router: ^14.2.7
  
  # Storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  
  # UI Components
  cupertino_icons: ^1.0.6
  
  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/languages/
    - assets/courses/
    - assets/lessons/
    - assets/lessons/python/
    - assets/quizzes/
    - assets/quizzes/lessons/
    - assets/quizzes/levels/
    - assets/images/
    - assets/images/languages/
    - assets/images/tracks/
    - assets/images/lessons/
    - assets/images/slides/
    - assets/images/avatars/
    - assets/images/backgrounds/

  fonts:
    - family: Cairo
      fonts:
        - asset: fonts/Cairo-Regular.ttf
        - asset: fonts/Cairo-Bold.ttf
          weight: 700
